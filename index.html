<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>יומן פרויקטים — לבנט</title>
<style>
:root{--purple:#7F77DD;--purple-bg:#efeefb;--gray:#888780;--gray-bg:#efeee9;--teal:#1D9E75;--teal-bg:#e4f4ee;
--amber:#EF9F27;--amber-dark:#854F0B;--text:#2C2C2A;--muted:#8a8880;--border:#e3e1d9;--border2:#c9c7bd;
--bg:#faf9f5;--card:#fff;--shadow:0 1px 3px rgba(0,0,0,.04)}
*{box-sizing:border-box}
body{font-family:"Segoe UI",Arial,sans-serif;color:var(--text);background:var(--bg);margin:0;padding:0}
header{background:var(--card);border-bottom:1px solid var(--border);padding:11px 22px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:40}
h1{font-size:18px;font-weight:700;margin:0;display:flex;align-items:center;gap:7px;white-space:nowrap}
.hspace{flex:1}
.menu{position:relative}
.dropdown{position:absolute;top:calc(100% + 8px);left:0;background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:0 10px 34px rgba(0,0,0,.13);padding:6px;min-width:216px;display:none;z-index:50}
.dropdown.open{display:block}
.dropdown button,.dropdown .who{display:flex;align-items:center;gap:10px;width:100%;text-align:right;background:none;border:none;font-family:inherit;font-size:14px;color:var(--text);padding:9px 11px;border-radius:8px;cursor:pointer}
.dropdown button:hover{background:var(--bg)}
.dropdown .who{color:var(--muted);font-size:13px;cursor:default}
.dropdown .sep{height:1px;background:var(--border);margin:5px 4px}
.layout{display:flex;align-items:flex-start;max-width:1180px;margin:0 auto}
.sidebar{width:238px;flex:none;padding:16px 12px;position:sticky;top:55px;align-self:flex-start;max-height:calc(100vh - 55px);overflow-y:auto;border-left:1px solid var(--border)}
.side-h{font-size:11px;color:var(--muted);font-weight:700;margin:16px 8px 7px;letter-spacing:.03em}
.pitem{display:block;width:100%;text-align:right;background:none;border:1px solid transparent;border-radius:10px;padding:9px 12px;font-size:14px;color:var(--text);cursor:pointer;margin-bottom:3px;line-height:1.35}
.pitem:hover{background:var(--card);border-color:var(--border)}
.pitem.active{background:var(--text);color:#fff;border-color:var(--text)}
.pitem.tgt{color:var(--purple);font-weight:600}
.pitem.tgt.active{background:var(--purple);color:#fff;border-color:var(--purple)}
.content{flex:1;min-width:0;max-width:none;padding:22px 26px}
@media(max-width:720px){.layout{flex-direction:column}.sidebar{width:100%;position:static;max-height:none;border-left:none;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:6px}.side-h{width:100%}.pitem{width:auto}.content{padding:18px}}
.btn{font-family:inherit;font-size:13px;padding:7px 13px;border-radius:9px;border:1px solid var(--border2);background:var(--card);color:var(--text);cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--text);background:#fcfbf8}
.btn.primary{background:var(--text);color:#fff;border-color:var(--text)}
.btn.primary:hover{background:#000}
.btn-add{color:var(--muted);background:none;font-size:13px;padding:6px 14px;border-radius:9px;border:1px dashed var(--border2);cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.btn-add:hover{color:var(--text);border-color:var(--text);background:#fcfbf8}
/* layout handled by .layout / .content */
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:var(--muted);margin-bottom:20px;align-items:center}
.legend span{display:inline-flex;align-items:center;gap:6px}
.lchip{width:22px;height:22px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;font-size:12px}
.tint-p{background:var(--purple-bg)} .tint-g{background:var(--gray-bg)} .tint-t{background:var(--teal-bg)}
/* timeline */
.tl{position:relative;padding-right:54px}
.tl::before{content:"";position:absolute;right:20px;top:8px;bottom:34px;width:2px;background:var(--border)}
.stage{position:relative;background:var(--card);border:1px solid var(--border);border-radius:13px;padding:11px 14px;margin-bottom:11px;box-shadow:var(--shadow)}
.stage.big{border-color:var(--teal);background:#fbfefc}
.stage,.delay{padding-left:30px}
.drag{position:absolute;left:8px;top:11px;color:var(--border2);cursor:grab;font-size:15px;user-select:none;line-height:1}
.drag:hover{color:var(--muted)} .drag:active{cursor:grabbing}
.dragging{opacity:.45}
.drop-before{box-shadow:0 -3px 0 0 var(--purple)}
.chip{position:absolute;right:-46px;top:11px;width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;border:3px solid var(--bg);user-select:none}
.chip.p{background:var(--purple-bg)} .chip.g{background:var(--gray-bg)} .chip.t{background:var(--teal-bg)}
.srow{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.snum{font-size:12px;color:var(--muted);min-width:20px;font-weight:600}
.stitle{flex:1;min-width:180px;font-family:inherit;font-size:15px;color:var(--text);border:1px solid transparent;border-radius:7px;padding:5px 7px;background:transparent}
.stitle:hover{border-color:var(--border)} .stitle:focus{border-color:var(--border2);background:var(--bg);outline:none}
.stitle.big{font-weight:700}
.dates{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:2px}
label.dt{font-size:12px;color:var(--muted);white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
input[type=date]{font-family:inherit;font-size:12px;padding:5px 7px;border:1px solid var(--border);border-radius:7px;background:var(--card);color:var(--text);width:140px}
input[type=date]:focus{outline:none;border-color:var(--purple)}
.dur{font-size:12px;color:var(--teal);font-weight:600;min-width:70px}
.x{border:none;background:none;color:#c9c7bd;cursor:pointer;font-size:14px;padding:2px 5px;border-radius:6px}
.x:hover{color:#A32D2D;background:#faeaea}
.zone{padding:2px 0 12px;display:flex;gap:8px}
.delay{position:relative;border:1px solid var(--amber);border-radius:11px;padding:10px 13px;margin:0 0 11px;background:#fdf8ef}
.delay .chip{background:#fbe6c4}
.dcause{flex:1;min-width:200px;font-family:inherit;font-size:13px;padding:6px 9px;border:1px solid #f0d9ab;border-radius:7px;background:var(--card);color:var(--text)}
.ddur{font-size:13px;color:var(--amber-dark);font-weight:700;min-width:80px}
.dnote{font-size:12px;color:var(--amber-dark);margin-top:5px;opacity:.85}
.addbar{display:flex;justify-content:center;margin-top:4px}
.summary{display:flex;align-items:center;gap:22px;flex-wrap:wrap;margin-top:22px;padding:15px 20px;background:var(--card);border:1px solid var(--border);border-radius:14px;font-size:14px;box-shadow:var(--shadow)}
.summary .si{display:flex;align-items:center;gap:8px} .summary b{font-weight:700;font-size:15px}
.empty{text-align:center;color:var(--muted);padding:44px 20px}
.empty .big{font-size:40px;margin-bottom:6px}
.empty p{font-size:15px;margin:6px 0 18px;line-height:1.6}
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
.pname{font-size:19px;font-weight:700;flex:1;display:flex;align-items:center;gap:8px}
/* modal (stage picker) */
.modalbg{position:fixed;inset:0;background:rgba(30,30,28,.4);display:none;align-items:center;justify-content:center;z-index:60;padding:16px}
.modal{background:var(--card);border-radius:18px;padding:22px;max-width:460px;width:100%;max-height:86vh;display:flex;flex-direction:column;box-shadow:0 12px 50px rgba(0,0,0,.2)}
.modal h3{margin:0 0 14px;font-size:18px;display:flex;align-items:center;gap:8px}
.pick-custom{display:flex;gap:8px}
.pick-custom input{flex:1;font-family:inherit;font-size:14px;padding:9px 11px;border:1px solid var(--border2);border-radius:9px}
.pick-custom input:focus{outline:none;border-color:var(--purple)}
.pick-or{font-size:13px;color:var(--muted);text-align:center;margin:16px 0 10px;position:relative}
.pick-list{overflow-y:auto;border:1px solid var(--border);border-radius:11px;padding:5px}
.pick-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;cursor:pointer;font-size:14px}
.pick-item:hover{background:var(--bg)}
.pick-item.added{background:var(--teal-bg);color:var(--teal)}
.pick-ico{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.modal-foot{display:flex;gap:10px;margin-top:16px}
.modal-foot .btn{flex:1;justify-content:center}
.tmodal label{display:block;font-size:13px;color:var(--muted);margin:13px 0 5px}
.tmodal select,.tmodal input{width:100%;font-family:inherit;font-size:14px;padding:10px 11px;border:1px solid var(--border2);border-radius:9px;background:var(--card);color:var(--text)}
.tmodal input{margin-top:8px}
.tmodal select:focus,.tmodal input:focus{outline:none;border-color:var(--purple)}
/* planning targets board */
.tgt-head{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:16px}
.tgt-title{font-size:19px;font-weight:700;display:flex;align-items:center;gap:8px}
.toggle{display:inline-flex;align-items:center;gap:8px;font-size:14px;cursor:pointer;padding:6px 13px;border:1.5px solid var(--border2);border-radius:22px;background:var(--card);user-select:none}
.toggle .sw{width:15px;height:15px;border-radius:5px;border:2px solid var(--border2)}
.toggle.tg{color:var(--purple)} .toggle.ac{color:var(--teal)}
.toggle.on{border-color:currentColor} .toggle.on .sw{background:currentColor;border-color:currentColor}
.board{display:flex;overflow-x:auto;border:1px solid var(--border);border-radius:14px;background:var(--card);box-shadow:var(--shadow)}
.yearcol{flex:none;border-left:2px solid var(--border)}
.yearcol:last-child{border-left:none}
.yearhead{text-align:center;font-weight:700;font-size:15px;padding:9px;background:var(--bg);border-bottom:1px solid var(--border)}
.quarters{display:flex}
.qcol{flex:none;width:176px;border-left:1px solid var(--border);min-height:340px;display:flex;flex-direction:column}
.qcol:last-child{border-left:none}
.qcol.now{background:#f6fcfa}
.qhead{font-size:13px;text-align:center;padding:7px;border-bottom:1px solid var(--border);font-weight:600;color:var(--muted)}
.qhead.now{color:var(--teal)}
.qbody{padding:9px;display:flex;flex-direction:column;gap:8px;flex:1}
.tcard{border-radius:10px;padding:8px 10px 9px;font-size:13px;border:1.5px solid var(--border2);position:relative}
.tcard.plan{border-style:dashed;border-color:var(--purple);background:var(--purple-bg)}
.tcard.act-ontime{border-color:var(--teal);background:var(--teal-bg)}
.tcard.act-late{border-color:var(--amber);background:#fdf4e6}
.tcard.act-early{border-color:#5b8def;background:#eef3fc}
.tcard.ghost{opacity:.55}
.tcard .pj{font-weight:700;font-size:12px;padding-left:34px}
.tcard .stg{margin-top:3px;line-height:1.35}
.badge{display:inline-block;margin-top:6px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
.badge.ontime{background:var(--teal-bg);color:var(--teal)} .badge.late{background:#fbe6c4;color:var(--amber-dark)}
.badge.early{background:#eef3fc;color:#3a63b8} .badge.pending{background:var(--gray-bg);color:var(--muted)}
.tcard .ctl{position:absolute;top:6px;left:6px;display:flex;gap:1px}
.tcard .ctl button{border:none;background:none;cursor:pointer;color:var(--muted);font-size:13px;padding:1px 4px;border-radius:5px;line-height:1}
.tcard .ctl button:hover{background:rgba(0,0,0,.07);color:var(--text)}
.addtgt{margin-top:auto;border:1px dashed var(--border2);color:var(--muted);background:none;border-radius:9px;padding:7px;cursor:pointer;font-size:13px}
.addtgt:hover{border-color:var(--text);color:var(--text)}
.tab.tgttab{border-color:var(--purple);color:var(--purple)}
.tab.tgttab.active{background:var(--purple);color:#fff;border-color:var(--purple)}
/* sync + auth */
.sync{font-size:12px;color:var(--muted);white-space:nowrap;display:flex;align-items:center;gap:5px}
.sync .sd{width:8px;height:8px;border-radius:50%;background:var(--gray)}
.sync.ok .sd{background:var(--teal)} .sync.saving .sd{background:var(--amber)} .sync.off .sd{background:#A32D2D}
#userbar{display:none;align-items:center;gap:10px;font-size:13px;color:var(--muted)}
#auth{position:fixed;inset:0;background:var(--bg);display:none;align-items:center;justify-content:center;z-index:70}
.authcard{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:34px 30px;max-width:380px;width:90%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.06)}
.authcard h2{font-size:20px;margin:0 0 6px}
.authcard p{font-size:14px;color:var(--muted);margin:0 0 20px;line-height:1.5}
.authcard input{width:100%;font-family:inherit;font-size:15px;padding:11px 12px;border:1px solid var(--border2);border-radius:10px;margin-bottom:12px;text-align:right}
.authcard .btn{width:100%;padding:11px;font-size:15px;background:var(--text);color:#fff;border-color:var(--text);justify-content:center}
#loginMsg{font-size:13px;margin-top:14px;min-height:18px;color:var(--teal)}
</style>
</head>
<body>
<header>
<h1>🏗️ יומן פרויקטים</h1>
<div class="hspace"></div>
<span class="sync" id="sync"><span class="sd"></span><span id="syncTxt"></span></span>
<div class="menu">
<button class="btn" id="settingsBtn">⚙️ הגדרות</button>
<div class="dropdown" id="settingsMenu">
<button id="excelBtn">📊 ייצוא לאקסל</button>
<button id="exportBtn">💾 גיבוי לקובץ</button>
<button id="importBtn">↩︎ שחזור מגיבוי</button>
<div class="sep"></div>
<span class="who" id="userEmail">👤 מחובר</span>
<button id="logoutBtn">🚪 יציאה</button>
</div>
</div>
<button class="btn primary" id="newProj">＋ פרויקט חדש</button>
<input type="file" id="importFile" accept=".json" style="display:none">
</header>
<div class="layout">
<aside class="sidebar" id="sidebar"></aside>
<main class="content"><div id="app"></div></main>
</div>

<!-- stage picker modal -->
<div class="modalbg" id="picker">
<div class="modal">
<h3>➕ הוספת שלב</h3>
<div class="pick-custom">
<input id="customStage" placeholder="שם שלב מותאם אישית…">
<button class="btn primary" id="addCustom">הוסף</button>
</div>
<div class="pick-or">— או בחר משלבי הרישוי המוכנים —</div>
<div class="pick-list" id="pickList"></div>
<div class="modal-foot">
<button class="btn" id="addAll">הוסף את כל השלבים</button>
<button class="btn" id="closePicker">סגור</button>
</div>
</div>
</div>

<!-- target modal -->
<div class="modalbg" id="tmodal">
<div class="modal tmodal">
<h3>🎯 הוספת יעד</h3>
<label>פרויקט</label>
<select id="tProject"></select>
<label>שלב תכנוני</label>
<select id="tStage"></select>
<input id="tCustomStage" placeholder="שם השלב…" style="display:none">
<label>רבעון יעד</label>
<select id="tQuarter"></select>
<div class="modal-foot">
<button class="btn primary" id="tAdd">הוסף יעד</button>
<button class="btn" id="tClose">ביטול</button>
</div>
</div>
</div>

<!-- login -->
<div id="auth">
<div class="authcard">
<h2>🏗️ יומן פרויקטים — לבנט</h2>
<p>הנתונים מסונכרנים בין כל המכשירים. הזן את סיסמת הצוות פעם אחת במכשיר הזה.</p>
<input type="password" id="loginEmail" placeholder="סיסמת הצוות" autocomplete="current-password">
<button class="btn" id="loginBtn">כניסה</button>
<div id="loginMsg"></div>
</div>
</div>

<script>
"use strict";
/* ===== CONFIG ===== כתובת שרת הסנכרון (Railway). הסיסמה נשמרת מקומית, לא בקוד ===== */
const API_BASE="https://project-journal-sync-production.up.railway.app";
/* ================================================================= */

const DEFAULT_STAGES=[
["קבלת תכנון ראשוני","p"],
["הגשת תיק מידע","t"],
["הזמנת מדידות","p"],
["דיוק תכנון ראשוני בהתאם לדרישות תיק מידע ומדידות","p"],
["גיוס יועצים","p"],
["אישור יזם לתכנון","t"],
["התנעת יועצים — תיאום יועצים לשלב ההגשה","p"],
["הגשה","t"],
["קליטת הבקשה","t"],
["סגירת תחנות מכון רישוי","g"],
["תיאום יועצים למכון בקרה — עבודה על נספחי תכן","p"],
["החלטת ועדה","t"],
["הטענת נספחים סופית למכון בקרה","g"],
["התחלת עבודה על טופס 2","p"],
["אישור מכון בקרת תכן","t"],
["התחלת עבודה על תוכניות 1:50 ורשימות","p"],
["אישור איכות סביבה","g"],
["בדיקה סופית","g"],
["אגרות והשבחה","g"],
["מתן היתר","t"]];
const COLORS={p:"var(--purple)",g:"var(--gray)",t:"var(--teal)"};
const CAT_NAMES={p:"תכנון ויועצים",g:"עירייה / מכון רישוי ובקרה",t:"אבן דרך"};
const CAT_ICON={p:"✏️",g:"🏛️",t:"🚩"};
const CAT_CYCLE={p:"g",g:"t",t:"p"};
const KEY="project-journal-v1";
const TARGETS_ID="__targets__";
const NOW_Y=new Date().getFullYear();
const YEARS=[NOW_Y,NOW_Y+1,NOW_Y+2];
let state={projects:[],cur:null,targets:[]};
try{const s=localStorage.getItem(KEY);if(s)state=JSON.parse(s);}catch(e){}
if(!Array.isArray(state.targets))state.targets=[];
(state.projects||[]).forEach(normProject);normTargets();
let view=localStorage.getItem("pj-view")||"projects";
let layers={target:true,actual:true};

/* ---------- cloud sync layer ---------- */
let TOKEN=localStorage.getItem("pj-token")||"";
let sbReady=false,es=null;
const CLIENT_ID=(function(){let v=localStorage.getItem("pj-client");if(!v){v=uid()+uid();localStorage.setItem("pj-client",v);}return v;})();
const syncTimers={};
const dirty=new Set();
let editing=false,pendingRemote=false;
function authHeaders(){return {Authorization:"Bearer "+TOKEN};}

function setStatus(kind){
const el=document.getElementById("sync"),t=document.getElementById("syncTxt");
if(!el)return;
el.className="sync"+(kind==="synced"?" ok":kind==="saving"?" saving":kind==="offline"?" off":"");
t.textContent=kind==="synced"?"מסונכרן":kind==="saving"?"שומר…":kind==="offline"?"לא מקוון — יסונכרן בהמשך":"";
}
function cacheLocal(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}
function save(){cacheLocal();queueSync(state.cur);}

function queueSync(id){
if(!id||!sbReady)return;
if(!state.projects.find(x=>x.id===id))return;
setStatus("saving");
clearTimeout(syncTimers[id]);
syncTimers[id]=setTimeout(()=>pushProject(id),700);
}
async function pushProject(id){
const p=state.projects.find(x=>x.id===id);
if(!p||!TOKEN)return;
const pos=state.projects.findIndex(x=>x.id===id);
try{
const r=await fetch(API_BASE+"/project",{method:"PUT",headers:Object.assign({"Content-Type":"application/json"},authHeaders()),
body:JSON.stringify({id:p.id,name:p.name,items:p.items,pos:pos<0?0:pos,updated_by:CLIENT_ID})});
if(!r.ok)throw new Error(r.status);
dirty.delete(id);setStatus("synced");
}catch(e){dirty.add(id);setStatus("offline");}
}
async function removeProjectRemote(id){
dirty.delete(id);
if(!TOKEN)return;
try{await fetch(API_BASE+"/project?id="+encodeURIComponent(id)+"&by="+encodeURIComponent(CLIENT_ID),{method:"DELETE",headers:authHeaders()});}catch(e){}
}
async function pushAll(){for(const p of state.projects){await pushProject(p.id);}}
let targetTimer=null;
function saveTargets(){
cacheLocal();
if(!sbReady)return;
setStatus("saving");
clearTimeout(targetTimer);
targetTimer=setTimeout(pushTargets,700);
}
async function pushTargets(){
if(!TOKEN)return;
try{
const r=await fetch(API_BASE+"/project",{method:"PUT",headers:Object.assign({"Content-Type":"application/json"},authHeaders()),
body:JSON.stringify({id:TARGETS_ID,name:"__targets__",stages:state.targets,pos:9999,updated_by:CLIENT_ID})});
if(!r.ok)throw new Error(r.status);
dirty.delete(TARGETS_ID);setStatus("synced");
}catch(e){dirty.add(TARGETS_ID);setStatus("offline");}
}

async function loadFromCloud(){
try{
const r=await fetch(API_BASE+"/state",{headers:authHeaders()});
if(!r.ok)throw new Error(r.status);
const d=await r.json();
const rows=d.projects||[];
const tRow=rows.find(x=>x.id===TARGETS_ID);
if(tRow&&Array.isArray(tRow.stages))state.targets=tRow.stages;
const cloud=rows.filter(x=>x.id!==TARGETS_ID).map(x=>normProject({id:x.id,name:x.name,items:x.items,stages:x.stages,pos:x.pos}));
const migrated=localStorage.getItem("pj-migrated");
if(cloud.length===0&&state.projects.length>0&&!migrated){
// כניסה ראשונה: העלאת פרויקטים שהיו שמורים מקומית אל הענן (מיגרציה חד-פעמית)
await pushAll();
}else{
state.projects=cloud;
if(state.cur&&!state.projects.find(p=>p.id===state.cur))state.cur=null;
if(!state.cur&&state.projects.length)state.cur=state.projects[0].id;
}
normTargets();
localStorage.setItem("pj-migrated","1");
cacheLocal();setStatus("synced");
}catch(e){setStatus("offline");}
render();
}
function subscribeRealtime(){
if(es)es.close();
es=new EventSource(API_BASE+"/events?token="+encodeURIComponent(TOKEN));
es.onmessage=ev=>{try{handleRemote(JSON.parse(ev.data));}catch(e){}};
es.onerror=()=>setStatus("offline"); // EventSource מתחבר מחדש לבד
}
function handleRemote(msg){
if(msg.type==="upsert"){
const n=msg.project;
if(!n||n.updated_by===CLIENT_ID)return; // ignore our own echo
if(n.id===TARGETS_ID){state.targets=Array.isArray(n.stages)?n.stages:[];normTargets();cacheLocal();rerenderSafe();return;}
const inc=normProject({id:n.id,name:n.name,items:n.items,stages:n.stages,pos:n.pos});
const i=state.projects.findIndex(p=>p.id===inc.id);
if(i<0)state.projects.push(inc);else state.projects[i]=inc;
state.projects.sort((a,b)=>(a.pos||0)-(b.pos||0));
if(!state.cur)state.cur=inc.id;
}else if(msg.type==="delete"){
if(msg.updated_by===CLIENT_ID)return;
if(msg.id===TARGETS_ID){state.targets=[];cacheLocal();rerenderSafe();return;}
state.projects=state.projects.filter(p=>p.id!==msg.id);
if(state.cur&&!state.projects.find(p=>p.id===state.cur))state.cur=state.projects[0]?state.projects[0].id:null;
}else return;
cacheLocal();
rerenderSafe();
}
function rerenderSafe(){if(editing){pendingRemote=true;}else render();}
document.addEventListener("focusin",e=>{if(e.target.matches&&e.target.matches("input,textarea"))editing=true;});
document.addEventListener("focusout",e=>{if(e.target.matches&&e.target.matches("input,textarea")){editing=false;if(pendingRemote){pendingRemote=false;render();}}});
setInterval(()=>{if(sbReady&&dirty.size){[...dirty].forEach(id=>id===TARGETS_ID?pushTargets():pushProject(id));}},12000);

/* ---------- app logic ---------- */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function newStageItem(title,cat){return {type:"stage",id:uid(),t:title||"",c:cat||"g",s:"",e:""}}
function newDelayItem(){return {type:"delay",id:uid(),cause:"",s:"",e:""}}
function catForTitle(title){const d=DEFAULT_STAGES.find(s=>s[0]===title);return d?d[1]:"p"}
function fromStages(stages){
const items=[];
(stages||[]).forEach(s=>{
items.push({type:"stage",id:s.id||uid(),t:s.t||"",c:s.c||"g",s:s.s||"",e:s.e||""});
if(s.d)items.push({type:"delay",id:uid(),cause:s.d.cause||"",s:s.d.s||"",e:s.d.e||""});
});
return items;
}
function normProject(p){
if(!p)return p;
if(!Array.isArray(p.items))p.items=fromStages(p.stages);
p.items.forEach(it=>{if(!it.id)it.id=uid();if(it.type!=="delay"&&it.type!=="stage")it.type="stage";});
delete p.stages;
return p;
}
function stageById(p,id){return p&&p.items?p.items.find(it=>it.type==="stage"&&it.id===id):null}
function normTargets(){
state.targets.forEach(t=>{
if(!t.sid&&(t.st||t.title)){
const p=state.projects.find(x=>x.id===t.pid);
const st=p?p.items.find(it=>it.type==="stage"&&it.t===(t.st||t.title)):null;
if(st)t.sid=st.id;
if(!t.title)t.title=t.st||"";
}
});
}
function proj(){return state.projects.find(p=>p.id===state.cur)}
function days(a,b){return (new Date(b)-new Date(a))/864e5}
function wk(d){
const w=(d/7).toFixed(1).replace(/\.0$/,"");
if(d>=28){const m=(d/30.4).toFixed(1).replace(/\.0$/,"");return w+" שב' (~"+m+" חוד')"}
return w+" שב'";
}
function esc(t){return (t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function today(){return new Date().toISOString().slice(0,10)}
function qidx(y,q){return y*4+(q-1)}
function qKey(y,q){return y+"-Q"+q}
function parseQ(k){const m=/^(\d+)-Q(\d)$/.exec(k||"");if(!m)return null;const y=+m[1],q=+m[2];return {y,q,idx:qidx(y,q)}}
function quarterOfDate(ds){if(!ds)return null;const d=new Date(ds);if(isNaN(d))return null;const y=d.getFullYear(),q=Math.floor(d.getMonth()/3)+1;return {y,q,idx:qidx(y,q)}}
function targetStage(t){const p=state.projects.find(x=>x.id===t.pid);return p?stageById(p,t.sid):null}
function targetTitle(t){const st=targetStage(t);return st?st.t:(t.title||t.st||"—")}
function actualQuarter(t){const st=targetStage(t);if(!st)return null;return quarterOfDate(st.e||st.s)}

let dragItem=null,dragProj=null;
function buildStage(p,it,no){
const big=it.c==="t",hasEnd=!!it.e;
const el=document.createElement("div");
el.className="stage"+(big?" big":"");
el.dataset.id=it.id;
el.innerHTML=`<span class="drag" title="גרור לסידור מחדש">⠿</span>
<span class="chip ${it.c}" title="${CAT_NAMES[it.c]} — לחץ להחלפה">${CAT_ICON[it.c]}</span>
<div class="srow">
<span class="snum">${no}</span>
<input class="stitle${big?" big":""}" value="${esc(it.t)}">
<button class="x xdel" title="מחק שלב">🗑️</button>
</div>
<div class="dates">
<label class="dt"><input type="date" class="ds" value="${it.s}"></label>
${hasEnd?`<span style="color:var(--muted)">←</span><label class="dt">סיום <input type="date" class="de" value="${it.e}"></label><span class="dur"></span><button class="x xrmend" title="הסר תאריך סיום">✕</button>`:`<button class="btn-add addend">＋ תאריך סיום</button>`}
</div>`;
el.querySelector(".chip").onclick=()=>{it.c=CAT_CYCLE[it.c];save();render();};
el.querySelector(".stitle").addEventListener("input",e=>{it.t=e.target.value;save();});
el.querySelector(".xdel").onclick=()=>{if(confirm('למחוק את השלב "'+(it.t||"")+'"?')){p.items.splice(p.items.indexOf(it),1);save();render();}};
el.querySelector(".ds").addEventListener("input",e=>{it.s=e.target.value;save();recalc(p);});
const de=el.querySelector(".de");if(de)de.addEventListener("input",e=>{it.e=e.target.value;save();recalc(p);});
const ae=el.querySelector(".addend");if(ae)ae.onclick=()=>{it.e=it.s||today();save();render();};
const re=el.querySelector(".xrmend");if(re)re.onclick=()=>{it.e="";save();render();};
setupDrag(el,it,p);
return el;
}
function buildDelay(p,it){
const started=!!it.s,ended=!!it.e;
const el=document.createElement("div");
el.className="delay";el.dataset.id=it.id;
el.innerHTML=`<span class="drag" title="גרור לסידור מחדש">⠿</span>
<span class="chip" title="עיכוב">⏳</span>
<div class="srow">
<span style="font-size:14px;color:var(--amber-dark);font-weight:700">עיכוב:</span>
<input class="dcause" value="${esc(it.cause)}" placeholder="הגורם המעכב — יזם, עירייה, יועץ, דיירים...">
<button class="x xdel" title="הסר עיכוב">✕</button>
</div>
<div class="dates">
${!started?`<button class="btn-add startdelay">▶️ התחלת עיכוב</button>`:`<label class="dt">מתאריך <input type="date" class="dds" value="${it.s}"></label><label class="dt">עד <input type="date" class="dde" value="${it.e}"></label>${!ended?`<button class="btn-add closedelay">⏹️ סגור עיכוב</button>`:""}<span class="ddur"></span>`}
</div>
<div class="dnote"></div>`;
el.querySelector(".dcause").addEventListener("input",e=>{it.cause=e.target.value;save();});
el.querySelector(".xdel").onclick=()=>{p.items.splice(p.items.indexOf(it),1);save();render();};
const sd=el.querySelector(".startdelay");if(sd)sd.onclick=()=>{it.s=today();save();render();};
const cd=el.querySelector(".closedelay");if(cd)cd.onclick=()=>{it.e=today();save();render();};
const dds=el.querySelector(".dds");if(dds)dds.addEventListener("input",e=>{it.s=e.target.value;save();recalc(p);});
const dde=el.querySelector(".dde");if(dde)dde.addEventListener("input",e=>{it.e=e.target.value;save();recalc(p);});
setupDrag(el,it,p);
return el;
}
function buildZone(p,it){
const z=document.createElement("div");z.className="zone";
const bd=document.createElement("button");bd.className="btn-add";bd.textContent="⏳ הוסף עיכוב";
bd.onclick=()=>{const idx=p.items.indexOf(it);p.items.splice(idx+1,0,newDelayItem());save();render();};
const bs=document.createElement("button");bs.className="btn-add";bs.textContent="➕ הוסף שלב";
bs.onclick=()=>openPicker(it.id);
z.appendChild(bd);z.appendChild(bs);
return z;
}
function setupDrag(el,it,p){
const h=el.querySelector(".drag");if(!h)return;
h.draggable=true;
h.addEventListener("dragstart",e=>{dragItem=it;dragProj=p;el.classList.add("dragging");e.dataTransfer.effectAllowed="move";try{e.dataTransfer.setData("text/plain",it.id);e.dataTransfer.setDragImage(el,20,16);}catch(_){}});
h.addEventListener("dragend",()=>{el.classList.remove("dragging");dragItem=null;dragProj=null;document.querySelectorAll(".drop-before").forEach(x=>x.classList.remove("drop-before"));});
}
function dropRef(tl,y){
const els=[...tl.querySelectorAll(".stage,.delay")].filter(el=>!el.classList.contains("dragging"));
for(const el of els){const r=el.getBoundingClientRect();if(y<r.top+r.height/2)return el;}
return null;
}
function attachDnD(p,tl){
tl.addEventListener("dragover",e=>{
if(!dragItem||dragProj!==p)return;
e.preventDefault();
tl.querySelectorAll(".drop-before").forEach(x=>x.classList.remove("drop-before"));
const ref=dropRef(tl,e.clientY);if(ref)ref.classList.add("drop-before");
});
tl.addEventListener("drop",e=>{
if(!dragItem||dragProj!==p)return;
e.preventDefault();
const ref=dropRef(tl,e.clientY);
const items=p.items,from=items.indexOf(dragItem);
if(from<0)return;
items.splice(from,1);
let to=items.length;
if(ref){const idx=items.findIndex(x=>x.id===ref.dataset.id);if(idx>=0)to=idx;}
items.splice(to,0,dragItem);
save();render();
});
}

function recalc(p){
let net=0,dl=0;const app=document.getElementById("app");
p.items.forEach(it=>{
const el=app.querySelector('[data-id="'+it.id+'"]');
if(it.type==="stage"){
const dur=el&&el.querySelector(".dur");
if(it.s&&it.e&&days(it.s,it.e)>=0){net+=days(it.s,it.e);if(dur)dur.textContent=wk(days(it.s,it.e));}
else if(dur)dur.textContent="";
}else{
const de=el&&el.querySelector(".ddur"),note=el&&el.querySelector(".dnote");
if(it.s&&it.e&&days(it.s,it.e)>=0){dl+=days(it.s,it.e);if(de)de.textContent=wk(days(it.s,it.e));if(note)note.textContent="";}
else if(it.s&&!it.e){const run=days(it.s,today());if(run>=0){dl+=run;if(de)de.textContent=wk(run)+" ⏳";if(note)note.textContent="עיכוב פעיל — נספר עד היום. לחץ 'סגור עיכוב' או הוסף תאריך 'עד'.";}}
else{if(de)de.textContent="";if(note)note.textContent="";}
}
});
const netEl=document.getElementById("net");if(netEl)netEl.textContent=net?wk(net):"—";
const dlyEl=document.getElementById("dly");if(dlyEl)dlyEl.textContent=dl?wk(dl):"—";
const all=[];p.items.forEach(it=>{if(it.s)all.push(it.s);if(it.e)all.push(it.e);});
const gr=document.getElementById("gross");
if(gr){if(all.length>=2){all.sort();gr.textContent=(days(all[0],all[all.length-1])/30.4).toFixed(1)+" חודשים";}else gr.textContent="—";}
}

if(layers.actual)items.filter(it=>it.aq&&it.aq.idx===idx).forEach(it=>body.appendChild(actualCard(it)));
const add=document.createElement("button");
add.className="addtgt";add.textContent="＋ יעד";
add.onclick=()=>openTargetModal(qKey(y,q));
body.appendChild(add);
}});
}
function targetCard(it){
const c=document.createElement("div");c.className="tcard plan"+(it.p?"":" ghost");
const pname=it.p?esc(it.p.name):"⚠️ פרויקט נמחק";
let badge;
if(it.aq===null)badge=`<span class="badge pending">⏳ טרם בוצע</span>`;
else if(it.status==="ontime")badge=`<span class="badge ontime">✅ בזמן</span>`;
else if(it.status==="late")badge=`<span class="badge late">🔴 באיחור +${it.delta} רבע'</span>`;
else badge=`<span class="badge early">🔵 מוקדם ${-it.delta} רבע'</span>`;
c.innerHTML=`<div class="ctl"><button data-mv="1" title="רבעון קודם">›</button><button data-mv="-1" title="רבעון הבא">‹</button><button data-del title="הסר">✕</button></div>
<div class="pj">🎯 ${pname}</div><div class="stg">${esc(targetTitle(it.t))}</div>${badge}`;
c.querySelector("[data-del]").onclick=()=>removeTarget(it.t);
c.querySelectorAll("[data-mv]").forEach(b=>b.onclick=()=>moveTarget(it.t,+b.dataset.mv));
return c;
}
function actualCard(it){
const c=document.createElement("div");
c.className="tcard "+(it.status==="late"?"act-late":it.status==="early"?"act-early":"act-ontime");
const pname=it.p?esc(it.p.name):"⚠️";
let badge;
if(it.status==="ontime")badge=`<span class="badge ontime">✅ בזמן</span>`;
else if(it.status==="late")badge=`<span class="badge late">🔴 +${it.delta} רבע' מהיעד</span>`;
else badge=`<span class="badge early">🔵 ${-it.delta} רבע' לפני היעד</span>`;
c.innerHTML=`<div class="pj">📌 ${pname}</div><div class="stg">${esc(targetTitle(it.t))}</div>${badge}`;
return c;
}
function removeTarget(t){state.targets=state.targets.filter(x=>x!==t);saveTargets();render();}
function moveTarget(t,delta){
const cur=parseQ(t.q);if(!cur)return;
const lo=qidx(YEARS[0],1),hi=qidx(YEARS[2],4);
const ni=Math.max(lo,Math.min(hi,cur.idx+delta));
t.q=qKey(Math.floor(ni/4),ni%4+1);saveTargets();render();
}
function fillStageSelect(){
const p=state.projects.find(x=>x.id===document.getElementById("tProject").value);
const existing=p?p.items.filter(it=>it.type==="stage"):[];
const existingTitles=existing.map(s=>s.t);
let html="";
if(existing.length)html+='<optgroup label="שלבים שכבר בפרויקט">'+existing.map(s=>`<option value="sid:${s.id}">${esc(s.t)}</option>`).join("")+'</optgroup>';
html+='<optgroup label="שלבי רישוי מוכנים">'+DEFAULT_STAGES.map(s=>`<option value="new:${esc(s[0])}">${esc(s[0])}${existingTitles.includes(s[0])?" ✓":""}</option>`).join("")+'</optgroup>';
html+='<option value="__custom__">➕ שלב אחר (טקסט חופשי)…</option>';
document.getElementById("tStage").innerHTML=html;
toggleCustomStage();
}
function toggleCustomStage(){
document.getElementById("tCustomStage").style.display=document.getElementById("tStage").value==="__custom__"?"block":"none";
}
function openTargetModal(presetQ){
const ps=document.getElementById("tProject");
ps.innerHTML=state.projects.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join("");
fillStageSelect();
let opts="";YEARS.forEach(y=>{for(let q=1;q<=4;q++){const k=qKey(y,q);opts+=`<option value="${k}"${k===presetQ?" selected":""}>${y} · רבעון ${q}</option>`;}});
document.getElementById("tQuarter").innerHTML=opts;
document.getElementById("tCustomStage").value="";
document.getElementById("tmodal").style.display="flex";
}
document.getElementById("tProject").onchange=fillStageSelect;
document.getElementById("tStage").onchange=toggleCustomStage;
document.getElementById("tClose").onclick=()=>document.getElementById("tmodal").style.display="none";
document.getElementById("tmodal").addEventListener("click",e=>{if(e.target.id==="tmodal")document.getElementById("tmodal").style.display="none";});
document.getElementById("tAdd").onclick=()=>{
const pid=document.getElementById("tProject").value;
const val=document.getElementById("tStage").value;
const q=document.getElementById("tQuarter").value;
const p=state.projects.find(x=>x.id===pid);
if(!p){alert("בחר פרויקט");return;}
let sid,title;
if(val.indexOf("sid:")===0){sid=val.slice(4);const st=stageById(p,sid);title=st?st.t:"";}
else{
if(val==="__custom__")title=document.getElementById("tCustomStage").value.trim();
else title=val.slice(val.indexOf(":")+1);
if(!title){alert("בחר או הקלד שלב");return;}
const st=newStageItem(title,catForTitle(title));
p.items.push(st);sid=st.id;
queueSync(p.id);
}
state.targets.push({id:uid(),pid:pid,sid:sid,title:title,q:q});
saveTargets();
document.getElementById("tmodal").style.display="none";
render();
};

/* ---------- stage picker ---------- */
let pickerAfterId=null;
function openPicker(afterId){
pickerAfterId=afterId;
const list=document.getElementById("pickList");
list.innerHTML="";
DEFAULT_STAGES.forEach((s)=>{
const it=document.createElement("div");
it.className="pick-item";
it.innerHTML=`<span class="pick-ico tint-${s[1]}">${CAT_ICON[s[1]]}</span><span>${esc(s[0])}</span>`;
it.onclick=()=>{addStage(newStageItem(s[0],s[1]));it.className="pick-item added";it.querySelector("span:last-child").textContent="✓ "+s[0];};
list.appendChild(it);
});
document.getElementById("customStage").value="";
document.getElementById("picker").style.display="flex";
setTimeout(()=>document.getElementById("customStage").focus(),50);
}
function closePicker(){document.getElementById("picker").style.display="none";}
function addStage(stageItem){
const p=proj();if(!p)return;
if(pickerAfterId==null)p.items.push(stageItem);
else{const idx=p.items.findIndex(x=>x.id===pickerAfterId);if(idx<0)p.items.push(stageItem);else{p.items.splice(idx+1,0,stageItem);pickerAfterId=stageItem.id;}}
save();render();
}
document.getElementById("addCustom").onclick=()=>{
const inp=document.getElementById("customStage");const v=inp.value.trim();
if(v){addStage(newStageItem(v,"p"));inp.value="";inp.focus();}
};
document.getElementById("customStage").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("addCustom").click();});
document.getElementById("addAll").onclick=()=>{DEFAULT_STAGES.forEach(s=>addStage(newStageItem(s[0],s[1])));closePicker();};
document.getElementById("closePicker").onclick=closePicker;
document.getElementById("picker").addEventListener("click",e=>{if(e.target.id==="picker")closePicker();});

document.getElementById("newProj").onclick=()=>{
const name=prompt("שם הפרויקט (למשל: ישראל מריזין 5):");
if(!name||!name.trim())return;
const p={id:uid(),name:name.trim(),items:[]};
state.projects.push(p);state.cur=p.id;setView("projects");save();render();
};
document.getElementById("excelBtn").onclick=()=>{
if(window.XLSX){doExcel();return;}
const s=document.createElement("script");
s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
s.onload=doExcel;
s.onerror=()=>alert("טעינת ספריית האקסל נכשלה — נדרש חיבור לאינטרנט");
document.head.appendChild(s);
};
function doExcel(){
if(!state.projects.length){alert("אין פרויקטים לייצוא");return;}
const wb=XLSX.utils.book_new();
wb.Workbook={Views:[{RTL:true}]};
state.projects.forEach(p=>{
const rows=[["#","סוג","שלב / גורם מעכב","קטגוריה","תאריך התחלה","תאריך סיום","משך (שבועות)"]];
let net=0,dl=0,no=0;
p.items.forEach(it=>{
if(it.type==="stage"){no++;
const durD=(it.s&&it.e&&days(it.s,it.e)>=0)?days(it.s,it.e):null;
if(durD!=null)net+=durD;
rows.push([no,"שלב",it.t,CAT_NAMES[it.c],it.s||"",it.e||"",durD!=null?+(durD/7).toFixed(1):""]);
}else{
let ddur=null,eLabel=it.e||"";
if(it.s&&it.e&&days(it.s,it.e)>=0)ddur=days(it.s,it.e);
else if(it.s&&!it.e){const r=days(it.s,today());if(r>=0){ddur=r;eLabel="פתוח (עד היום)";}}
if(ddur!=null)dl+=ddur;
rows.push(["","עיכוב",it.cause||"","",it.s||"",eLabel,ddur!=null?+(ddur/7).toFixed(1):""]);
}
});
rows.push([]);
rows.push(["","","סה\"כ עבודה נטו (שבועות)","","","",+(net/7).toFixed(1)]);
rows.push(["","","סה\"כ עיכובים (שבועות)","","","",+(dl/7).toFixed(1)]);
const ws=XLSX.utils.aoa_to_sheet(rows);
ws["!cols"]=[{wch:4},{wch:8},{wch:52},{wch:24},{wch:13},{wch:15},{wch:15}];
let base=(p.name.replace(/[\\\/\?\*\[\]:]/g," ").trim()||"פרויקט").slice(0,31),name=base,n=1;
while(wb.SheetNames.includes(name))name=base.slice(0,28)+" "+(++n);
XLSX.utils.book_append_sheet(wb,ws,name);
});
XLSX.writeFile(wb,"יומן-פרויקטים.xlsx");
}
document.getElementById("exportBtn").onclick=()=>{
const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="project-journal-backup.json";
a.click();
};
document.getElementById("importBtn").onclick=()=>document.getElementById("importFile").click();
document.getElementById("importFile").addEventListener("change",e=>{
const f=e.target.files[0];if(!f)return;
const r=new FileReader();
r.onload=()=>{try{const d=JSON.parse(r.result);if(d.projects){state=d;if(!Array.isArray(state.targets))state.targets=[];(state.projects||[]).forEach(normProject);normTargets();cacheLocal();render();pushAll();}else alert("קובץ לא תקין");}catch(err){alert("קובץ לא תקין");}};
r.readAsText(f);
});

render();
initApp();
</script>
</body>
